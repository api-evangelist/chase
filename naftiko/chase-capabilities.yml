name: chase-capabilities
description: >-
  Naftiko sandbox capabilities for the Chase Developer Portal APIs covering
  FDX-aligned account aggregation and consent, plus the Chase loyalty
  platform (Rewards Balance, Pay with Points orders and enrollment, and
  Merchant Relationship Manager).
provider: chase
version: '1.0'
capabilities:
  - id: chase.accounts.list
    name: List accounts
    description: List accounts that the customer has consented to share.
    operationId: listAccounts
    inputs: []
    outputs:
      - name: accounts
        type: array
    tags: [aggregation, accounts, fdx]
  - id: chase.accounts.transactions
    name: List account transactions
    description: List transactions for an account within a time window.
    operationId: listAccountTransactions
    inputs:
      - name: accountId
        type: string
        required: true
      - name: startTime
        type: string
        required: false
      - name: endTime
        type: string
        required: false
    outputs:
      - name: transactions
        type: array
    tags: [aggregation, transactions, fdx]
  - id: chase.consent.create
    name: Create consent
    description: Create a Chase consent record for FDX data sharing.
    operationId: createConsent
    inputs:
      - name: permissions
        type: array
        required: true
      - name: expirationTime
        type: string
        required: false
    outputs:
      - name: consent
        type: object
    tags: [consent, fdx]
  - id: chase.consent.revoke
    name: Revoke consent
    description: Revoke an existing consent record.
    operationId: revokeConsent
    inputs:
      - name: consentId
        type: string
        required: true
    outputs: []
    tags: [consent, fdx]
  - id: chase.rewards.balance
    name: Get rewards balance
    description: Retrieve a card's Chase Ultimate Rewards balance.
    operationId: getRewardsBalance
    inputs:
      - name: cardToken
        type: string
        required: true
      - name: merchantId
        type: string
        required: false
    outputs:
      - name: balance
        type: object
    tags: [loyalty, rewards]
  - id: chase.payWithPoints.order.create
    name: Create Pay with Points order
    description: Create a Pay with Points order for redemption at checkout.
    operationId: createOrder
    inputs:
      - name: cardToken
        type: string
        required: true
      - name: merchantId
        type: string
        required: true
      - name: amount
        type: number
        required: true
      - name: pointsToRedeem
        type: integer
        required: false
    outputs:
      - name: order
        type: object
    tags: [loyalty, payments]
  - id: chase.payWithPoints.order.refund
    name: Refund Pay with Points order
    description: Issue a refund against a captured Pay with Points order.
    operationId: refundOrder
    inputs:
      - name: orderId
        type: string
        required: true
      - name: amount
        type: number
        required: false
    outputs:
      - name: refund
        type: object
    tags: [loyalty, payments]
  - id: chase.payWithPoints.enroll
    name: Enroll card in Pay with Points
    description: Enroll a customer's payment card in the Pay with Points program.
    operationId: createEnrollment
    inputs:
      - name: cardToken
        type: string
        required: true
      - name: merchantId
        type: string
        required: true
    outputs:
      - name: enrollment
        type: object
    tags: [loyalty, enrollment]
  - id: chase.merchant.create
    name: Onboard merchant
    description: Onboard a new merchant in the Chase loyalty platform.
    operationId: createMerchant
    inputs:
      - name: name
        type: string
        required: true
      - name: mcc
        type: string
        required: true
    outputs:
      - name: merchant
        type: object
    tags: [loyalty, merchants]
