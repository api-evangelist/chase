specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Chase
providerId: chase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Open Banking
  - FDX
  - Loyalty
description: The Chase Developer Portal exposes FDX-aligned account aggregation, customer consent, rewards
  balance, and Pay with Points APIs. Access is limited to vetted FDX data recipients, partner aggregators,
  and Pay with Points enrolled merchants; commercial terms are negotiated per partner under JPMorgan
  Chase Bank, N.A. agreements rather than published as a per-call rate card.
notes: No public API price list. Pricing/access is partner-gated; consumers must engage Chase / J.P.
  Morgan business development.
sources:
  - https://developer.chase.com/
  - https://developer.chase.com/products/aggregation-fdx/
  - https://developer.chase.com/products/loyalty-pay-with-points/
plans:
  - id: chase-fdx-aggregation
    name: FDX Aggregation Partner
    type: enterprise
    description: FDX-aligned access to Chase customer account data for authorized data recipients (account
      info, balances, transactions, statements). OAuth 2.0 with FDX consent.
    entries:
      - label: FDX partner access
        name: fdx_partner
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: Account profile / balances / transactions / statements
      - name: FDX consent flows
      - name: OAuth 2.0
  - id: chase-pay-with-points
    name: Loyalty Pay with Points
    type: enterprise
    description: Merchant integration for redeeming Chase Ultimate Rewards points at checkout. Commercial
      terms negotiated per merchant.
    entries:
      - label: Pay with Points partner
        name: pay_with_points
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: Rewards balance lookup
      - name: Points redemption at checkout
      - name: Merchant onboarding by Chase
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
