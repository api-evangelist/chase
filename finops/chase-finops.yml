specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Chase
providerId: chase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Banking
  - Open Banking
description: 'FOCUS-aligned FinOps framing for Chase developer APIs: API access is partner-contracted;
  underlying revenue/cost flows from interchange, rewards economics, and partner integration fees rather
  than a separate per-API price list.'
notes: APIs are not separately priced; meters reflect partner integration billing surface.
sources:
  - https://developer.chase.com/
  - https://www.jpmorganchase.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: JPMorgan Chase Bank, N.A.
serviceCategory: Financial Services / Banking
billingModel:
  pricingCategory: Partner Contract + Interchange
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Chase Developer APIs
  ServiceCategory: Financial Services
  ProviderName: Chase
  PublisherName: JPMorgan Chase Bank, N.A.
  InvoiceIssuerName: JPMorgan Chase Bank, N.A.
  BillingCurrency: USD
meters:
  - name: fdx_consents
    unit: consent
    aggregation: sum
  - name: aggregation_requests
    unit: request
    aggregation: sum
    dimensions:
      - dataType
  - name: points_redemption_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant
  - name: points_redeemed
    unit: point
    aggregation: sum
    dimensions:
      - merchant
principles:
  - name: Visibility
    description: Track FDX consent counts, aggregation request volume, and Pay with Points redemption
      reports through the partner portal.
  - name: Allocation
    description: Allocate by merchant ID / aggregator ID; tie redemption costs to the corresponding loyalty
      campaign.
  - name: Optimization
    description: Cache FDX data within consent windows, batch read requests, and tune redemption UX to
      lift conversion without inflating points liability.
  - name: Accountability
    description: Partner relationship owner reviews monthly partner statements and FDX consent telemetry;
      treasury / loyalty finance owns points liability.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
