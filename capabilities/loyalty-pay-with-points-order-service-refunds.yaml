naftiko: 1.0.0-alpha2
info:
  label: Chase Loyalty Pay with Points Order Service API — Refunds
  description: 'Chase Loyalty Pay with Points Order Service API — Refunds. 1 operations. Lead operation: Refund a Pay with
    Points order. Self-contained Naftiko capability covering one Chase business surface.'
  tags:
  - Chase
  - Refunds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHASE_API_KEY: CHASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: loyalty-pay-with-points-order-service-refunds
    baseUri: https://api.chase.com/loyalty/pay-with-points/orders
    description: Chase Loyalty Pay with Points Order Service API — Refunds business capability. Self-contained, no shared
      references.
    resources:
    - name: orders-orderId-refunds
      path: /orders/{orderId}/refunds
      operations:
      - name: refundorder
        method: POST
        description: Refund a Pay with Points order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CHASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: loyalty-pay-with-points-order-service-refunds-rest
    port: 8080
    description: REST adapter for Chase Loyalty Pay with Points Order Service API — Refunds. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/orders/{orderid}/refunds
      name: orders-orderid-refunds
      description: REST surface for orders-orderId-refunds.
      operations:
      - method: POST
        name: refundorder
        description: Refund a Pay with Points order
        call: loyalty-pay-with-points-order-service-refunds.refundorder
        with:
          orderId: rest.orderId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: loyalty-pay-with-points-order-service-refunds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chase Loyalty Pay with Points Order Service API — Refunds. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: refund-pay-points-order
      description: Refund a Pay with Points order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: loyalty-pay-with-points-order-service-refunds.refundorder
      with:
        orderId: tools.orderId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
