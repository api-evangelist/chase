naftiko: 1.0.0-alpha2
info:
  label: Chase Account and Customer Information API — Transactions
  description: 'Chase Account and Customer Information API — Transactions. 1 operations. Lead operation: List account transactions.
    Self-contained Naftiko capability covering one Chase business surface.'
  tags:
  - Chase
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHASE_API_KEY: CHASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-and-customer-information-transactions
    baseUri: https://api.chase.com/aggregation/fdx
    description: Chase Account and Customer Information API — Transactions business capability. Self-contained, no shared
      references.
    resources:
    - name: accounts-accountId-transactions
      path: /accounts/{accountId}/transactions
      operations:
      - name: listaccounttransactions
        method: GET
        description: List account transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: startTime
          in: query
          type: string
        - name: endTime
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: account-and-customer-information-transactions-rest
    port: 8080
    description: REST adapter for Chase Account and Customer Information API — Transactions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/transactions
      name: accounts-accountid-transactions
      description: REST surface for accounts-accountId-transactions.
      operations:
      - method: GET
        name: listaccounttransactions
        description: List account transactions
        call: account-and-customer-information-transactions.listaccounttransactions
        with:
          accountId: rest.accountId
          startTime: rest.startTime
          endTime: rest.endTime
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-and-customer-information-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Chase Account and Customer Information API — Transactions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-account-transactions
      description: List account transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-and-customer-information-transactions.listaccounttransactions
      with:
        accountId: tools.accountId
        startTime: tools.startTime
        endTime: tools.endTime
      outputParameters:
      - type: object
        mapping: $.
