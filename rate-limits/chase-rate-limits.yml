specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Chase
providerId: chase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Banking
  - FDX
description: Chase Developer Portal does not publish numeric API rate limits. Access is partner-gated
  via OAuth 2.0; throttling and quotas are governed by the partner onboarding configuration. FDX flows
  also throttle at the customer-consent layer.
notes: No public per-second/per-minute rate limit numbers documented; partner-negotiated.
sources:
  - https://developer.chase.com/
responseCodes:
  throttled: 429
  unauthorized: 401
  serviceUnavailable: 503
limits:
  - name: FDX Aggregation API
    scope: oauth_client
    metric: varies
    limit: see partner agreement
  - name: Pay with Points API
    scope: oauth_client
    metric: varies
    limit: see partner agreement
policies:
  - name: OAuth 2.0
    description: All endpoints require OAuth 2.0; FDX consent flows govern user-level data access.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429/503; honor Retry-After when present.
  - name: Consent revocation
    description: Customers can revoke FDX consent at any time; aggregators must handle 401/403 from previously
      authorized accounts.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
