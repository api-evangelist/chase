apis:
  - aid: chase:account-and-customer-information-api
    name: Account and Customer Information API
    tags: []
    humanURL: https://developer.chase.com/products/aggregation-fdx/
    properties:
      - url: >-
          https://developer.chase.com/products/aggregation-fdx/guides/using-the-account-and-customer-information-api/
        type: Documentation
    description: >-
      The Account and Customer Information API is a powerful tool that allows organizations
      to securely access and manage account and customer data in a streamlined and
      efficient manner. This API provides seamless integration with various systems
      and platforms, enabling businesses to easily retrieve, update, and analyze information
      related to their customers and accounts.
  - aid: chase:account-aggregation-user-consent-api
    name: Account Aggregation User Consent API
    tags: []
    humanURL: https://developer.chase.com/products/aggregation-consent/
    properties:
      - url: https://developer.chase.com/products/aggregation-consent/
        type: Documentation
    description: >-
      The Account Aggregation User Consent API is a tool designed to streamline and
      simplify the process of obtaining user consent for accessing and aggregating
      financial information from multiple accounts. This API enables developers to
      seamlessly integrate consent management functionalities into their applications,
      allowing users to grant permission for their financial data to be accessed and
      shared with third-party services securely and efficiently.
  - aid: chase:loyalty-pay-with-points-order-service-api
    name: Loyalty Pay with Points Order Service API
    tags: []
    humanURL: >-
      https://developer.chase.com/products/loyalty-pay-with-points-order-service/
    properties:
      - url: >-
          https://developer.chase.com/products/loyalty-pay-with-points-enrollment-service/
        type: Documentation
    description: >-
      Loyalty Pay with Points Order Service API is a powerful tool that allows businesses
      to integrate loyalty program rewards into their payment systems. With this API,
      customers can earn points for their purchases and redeem them for discounts
      or other perks at the point of sale. By seamlessly incorporating loyalty rewards
      into the ordering process, businesses can increase customer engagement and drive
      repeat business.
  - aid: chase:rewards-balance-api
    name: Rewards Balance API
    tags: []
    humanURL: https://developer.chase.com/products/rewards-balance-api/
    properties:
      - url: 
          https://developer.chase.com/products/rewards-balance-api/specification
        type: Documentation
    description: >-
      The Rewards Balance API is a tool that allows businesses to easily access and
      manage their customers' rewards points or loyalty program balances. This API
      enables companies to retrieve real-time information about customers' reward
      balances, track their points transactions, and update balances as needed.
  - aid: chase:loyalty-pci-merchant-relationship-manager-api
    name: Loyalty PCI Merchant Relationship Manager API
    tags: []
    humanURL: >-
      https://developer.chase.com/products/loyalty-pci-merchant-relation-manager/
    properties:
      - url: >-
          https://developer.chase.com/products/loyalty-pci-merchant-relation-manager/
        type: Documentation
    description: >-
      The Loyalty PCI Merchant Relationship Manager API is a powerful tool that helps
      businesses effectively manage their merchant relationships, ensuring seamless
      transactions and customer satisfaction. This API allows businesses to easily
      navigate and track their merchant partnerships, providing valuable insights
      into sales performance and customer engagement.
  - aid: chase:loyalty-pay-with-points-enrollment-service-api
    name: Loyalty Pay with Points Enrollment Service API
    tags: []
    humanURL: >-
      https://developer.chase.com/products/loyalty-pay-with-points-enrollment-service/
    properties:
      - url: >-
          https://developer.chase.com/products/loyalty-pay-with-points-enrollment-service/
        type: Documentation
    description: >-
      The Loyalty Pay with Points Enrollment Service API is a tool that allows users
      to easily enroll in loyalty programs and earn points by making purchases with
      participating merchants. With this API, customers can link their loyalty program
      account to their payment method, making it seamless to earn and redeem points
      during transactions. By using this service, users can track their points balance,
      view available rewards, and even automatically apply points to discounted purchases.
